version: "3.8"

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: production_postgres_db
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: secure_prod_password
      POSTGRES_DB: userManagementServiceDB  # Updated database target name
    ports:
      - "5432:5432"
    volumes:
      - postgres_runtime_data:/var/lib/postgresql/data
    healthcheck:
      # Updated the health check command to target your specific database
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d userManagementServiceDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: production_web_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres_db:
        condition: service_healthy
