[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
testpaths = tests

# Suppress deprecation warnings from third-party libraries we don't control.
# python-jose internally uses datetime.utcnow() which is deprecated in Python 3.12+.
# Starlette uses the old HTTP_422_UNPROCESSABLE_ENTITY constant in its internals.
# Track https://github.com/mpdavis/python-jose/issues for an upstream fix.
filterwarnings =
    ignore::DeprecationWarning:jose.*
    ignore::DeprecationWarning:starlette.*
